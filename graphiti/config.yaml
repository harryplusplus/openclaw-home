server:
  transport: "http"
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "openai"
  model: "glm-5.1:cloud"
  max_tokens: 8192

  providers:
    openai:
      api_key: ollama
      api_url: http://host.docker.internal:11434/v1

embedder:
  provider: "openai"
  model: "nomic-embed-text"
  dimensions: 768

  providers:
    openai:
      api_key: ollama
      api_url: http://host.docker.internal:11434/v1

database:
  provider: "falkordb"

  providers:
    falkordb:
      uri: redis://localhost:6379
      database: default_db

graphiti:
  group_id: openclaw
  user_id: openclaw